# ============================================================
# Secrets — чутливі дані.
#
# ВАЖЛИВО: stringData = plaintext, K8s сам конвертує в base64.
# В production — замінити на реальні значення або використати
# External Secrets / Sealed Secrets.
#
# Генерація base64 вручну: echo -n "value" | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: vdm-secrets
  namespace: vdm
type: Opaque
stringData:
  # --- PostgreSQL ---
  SPRING_DATASOURCE_PASSWORD: "CHANGE_ME"

  # --- RabbitMQ ---
  SPRING_RABBITMQ_USERNAME: "vdm"
  SPRING_RABBITMQ_PASSWORD: "CHANGE_ME"

  # --- MinIO ---
  MINIO_ACCESS_KEY: "CHANGE_ME"
  MINIO_SECRET_KEY: "CHANGE_ME"

  # --- JWT або інший app secret ---
  APP_JWT_SECRET: "CHANGE_ME_MIN_32_CHARS"
