<div class="app-layout">

  <!-- Header і Nav тільки на публічних сторінках -->
  <ng-container *ngIf="!hideShell()">
    <app-header />
  </ng-container>

  <main class="app-main" [class.app-main--full]="hideShell()">
    <router-outlet />
  </main>

  <!-- Footer тільки на публічних сторінках -->
  <app-footer *ngIf="!hideShell()" />

</div>
