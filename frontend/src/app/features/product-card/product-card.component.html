<a class="product-card" [routerLink]="['/products', product.id]">

  <!-- Бейдж NEW/TOP — передається через @Input -->
  <div class="product-card__badge" *ngIf="badge">
    <span class="badge" [class.badge--new]="badge === 'NEW'" [class.badge--top]="badge === 'TOP'">
      {{ badge }}
    </span>
  </div>

  <!-- Серце -->
  <button *ngIf="isClient"
          class="product-card__heart"
          [class.product-card__heart--active]="isFav()"
          (click)="toggleFav($event)"
          title="Додати в обране">
    <svg width="14" height="14" viewBox="0 0 24 24"
         [attr.fill]="isFav() ? 'currentColor' : 'none'"
         stroke="currentColor" stroke-width="2">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
  </button>

  <!-- Зображення -->
  <div class="product-card__img-wrap">
    <img *ngIf="product.imageUrl"
         [src]="product.imageUrl" [alt]="product.name"
         class="product-card__img" loading="lazy" />
    <div *ngIf="!product.imageUrl" class="product-card__no-img">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
  </div>

  <!-- Тіло -->
  <div class="product-card__body">
    <a [routerLink]="['/products', product.id]" class="product-card__name">
      {{ product.name }}
    </a>

    <p class="product-card__availability">
      <span class="product-card__dot"></span> В наявності
    </p>

    <div class="product-card__footer">
      <div class="product-card__price">
        {{ formatPrice(product.price) }}<span>грн</span>
      </div>

      <!-- Клієнт: В кошик -->
      <button *ngIf="isClient"
              class="product-card__cart btn btn--sm"
              [class.btn--primary]="!added()"
              [class.btn--success]="added()"
              (click)="onAddToCart($event)"
              [title]="added() ? 'Додано!' : 'В кошик'">
        <ng-container *ngIf="!added()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          В кошик
        </ng-container>
        <ng-container *ngIf="added()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Додано
        </ng-container>
      </button>

      <!-- Гість: Детальніше -->
      <a *ngIf="!isClient && !isAdmin"
         [routerLink]="['/products', product.id]"
         class="product-card__cart btn btn--outline btn--sm">
        Детальніше
      </a>
    </div>
  </div>
</a>
