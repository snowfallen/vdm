<div class="dashboard">

  <div class="admin-page__header">
    <h1 class="admin-page__title">
      {{ isAdmin() ? 'Панель адміністратора' : 'Кабінет' }}
    </h1>
  </div>

  <!-- ====== STATS (тільки адмін) ====== -->
  <ng-container *ngIf="isAdmin()">
    <div class="stats-grid" *ngIf="!isLoading()">
      <a *ngFor="let s of stats()"
         [routerLink]="s.link"
         class="stat-card"
         [class]="'stat-card--' + s.color">
        <div class="stat-card__icon" [innerHTML]="getIcon(s.icon)"></div>
        <div class="stat-card__body">
          <div class="stat-card__value">{{ s.value }}</div>
          <div class="stat-card__label">{{ s.label }}</div>
        </div>
        <svg class="stat-card__arrow" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <path d="m9 18 6-6-6-6"/>
        </svg>
      </a>
    </div>

    <!-- Скелетон stats -->
    <div class="stats-grid" *ngIf="isLoading()">
      <div *ngFor="let _ of [1,2,3,4]" class="skeleton" style="height:96px;border-radius:12px;"></div>
    </div>
  </ng-container>

  <!-- ====== QUICK LINKS ====== -->
  <div class="section-title">Швидкі дії</div>

  <div class="quick-grid">
    <a *ngFor="let link of quickLinks"
       [routerLink]="link.path"
       class="quick-card">
      <div class="quick-card__icon" [innerHTML]="getIcon(link.icon)"></div>
      <div class="quick-card__body">
        <div class="quick-card__label">{{ link.label }}</div>
        <div class="quick-card__desc">{{ link.description }}</div>
      </div>
      <svg class="quick-card__arrow" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2">
        <path d="m9 18 6-6-6-6"/>
      </svg>
    </a>
  </div>

</div>
