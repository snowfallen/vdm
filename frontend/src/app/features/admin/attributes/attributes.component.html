<div class="admin-page">

  <div class="admin-page__header">
    <div>
      <h1 class="admin-page__title">Атрибути товарів</h1>
      <p class="admin-page__sub">{{ totalElements() }} атрибутів</p>
    </div>
    <button class="btn btn--primary" (click)="openCreate()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Додати атрибут
    </button>
  </div>

  <app-data-table
    [columns]="columns"
    [data]="attributes()"
    [isLoading]="isLoading()"
    [totalElements]="totalElements()"
    [pageSize]="pageSize"
    [currentPage]="currentPage()"
    emptyMessage="Атрибути відсутні"
    (edit)="openEdit($event)"
    (delete)="confirmDelete($event)"
    (pageChange)="loadAttributes($event)">
  </app-data-table>

  <!-- MODAL -->
  <div class="modal-overlay" *ngIf="modalOpen()" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">

      <div class="modal__header">
        <h2 class="modal__title">
          {{ isEditing ? 'Редагувати атрибут' : 'Новий атрибут' }}
        </h2>
        <button class="modal__close" (click)="closeModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <form [formGroup]="form" (ngSubmit)="save()" class="modal__form">

        <div class="form-field">
          <label class="form-field__label">Назва *</label>
          <input class="form-field__input"
                 formControlName="name"
                 placeholder="Колір, Висота, Матеріал..."
                 [class.invalid]="form.get('name')?.invalid && form.get('name')?.touched" />
          <span class="form-field__error"
                *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
            Обов'язкове поле
          </span>
        </div>

        <div class="form-field">
          <label class="form-field__label">Тип даних *</label>
          <select class="form-field__select" formControlName="dataType">
            <option *ngFor="let t of dataTypes" [value]="t.value">{{ t.label }}</option>
          </select>
          <span class="form-field__hint">
            DICT — вибір зі списку | TEXT — довільний текст | NUMBER — число з одиницею
          </span>
        </div>

        <!-- Одиниця виміру — тільки для NUMBER -->
        <div class="form-field" *ngIf="selectedDataType === 'NUMBER'">
          <label class="form-field__label">Одиниця виміру</label>
          <select class="form-field__select" formControlName="unitId">
            <option [ngValue]="null">— без одиниці —</option>
            <option *ngFor="let u of units()" [ngValue]="u.id">
              {{ u.symbol }} ({{ u.description }})
            </option>
          </select>
        </div>

        <div class="form-field__error" *ngIf="error()">{{ error() }}</div>

        <div class="modal__actions">
          <button type="button" class="btn btn--ghost" (click)="closeModal()">Скасувати</button>
          <button type="submit" class="btn btn--primary" [disabled]="form.invalid">
            {{ isEditing ? 'Зберегти' : 'Створити' }}
          </button>
        </div>
      </form>

    </div>
  </div>

  <app-confirm-dialog
    [isOpen]="deleteId() !== null"
    message="Атрибут та всі його опції і зв'язки з товарами будуть видалені."
    (confirmed)="doDelete()"
    (cancelled)="deleteId.set(null)">
  </app-confirm-dialog>

</div>
