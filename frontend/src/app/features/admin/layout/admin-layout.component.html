<div class="admin" [class.admin--collapsed]="!sidebarOpen()">

  <!-- ====== SIDEBAR ====== -->
  <aside class="sidebar">
    <div class="sidebar__header">
      <a routerLink="/" class="sidebar__logo">
        <span class="sidebar__logo-vdm">ВДМ</span>
        <span class="sidebar__logo-panel" *ngIf="sidebarOpen()">Адмін</span>
      </a>
    </div>

    <nav class="sidebar__nav">
      <a *ngFor="let item of visibleNavItems"
         [routerLink]="item.path"
         routerLinkActive="sidebar__link--active"
         [routerLinkActiveOptions]="{ exact: item.path === '/admin' }"
         class="sidebar__link"
         [title]="!sidebarOpen() ? item.label : ''">
        <span class="sidebar__icon" [innerHTML]="getIcon(item.icon)"></span>
        <span class="sidebar__label" *ngIf="sidebarOpen()">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar__footer">
      <!-- Роль бейдж -->
      <div class="sidebar__role" *ngIf="sidebarOpen()">
        <span class="badge" [class.badge--top]="isAdmin()" [class.badge--muted]="!isAdmin()">
          {{ isAdmin() ? 'ADMIN' : 'CLIENT' }}
        </span>
          <a routerLink="/" class="btn btn--outline btn--sm">
              ← На сайт
          </a>
      </div>


      <button class="sidebar__logout" (click)="logout()" [title]="!sidebarOpen() ? 'Вийти' : ''">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span *ngIf="sidebarOpen()">Вийти</span>
      </button>
    </div>
  </aside>

  <!-- ====== MAIN CONTENT ====== -->
  <main class="admin__main">
    <router-outlet />
  </main>

</div>
