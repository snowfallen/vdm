<!-- ============================================================
     HERO SLIDER
     ============================================================ -->
<section class="hero" aria-label="Головний банер">
    <div class="hero__slides">
        <div *ngFor="let slide of slides; let i = index"
             class="hero__slide"
             [class]="'hero__slide hero__slide--' + slide.bg"
             [class.hero__slide--active]="activeSlide() === i"
             [style.background-image]="slide.imageUrl ? 'url(' + slide.imageUrl + ')' : null">

            <div class="hero__overlay" *ngIf="slide.imageUrl"></div>

            <div class="container hero__content">
                <div class="hero__text animate-fade-in">
                    <p class="hero__subtitle" *ngIf="slide.subtitle">{{ slide.subtitle }}</p>
                    <h1 class="hero__title">{{ slide.title }}</h1>
                    <a [routerLink]="slide.ctaLink" class="btn btn--primary btn--lg hero__cta">
                        {{ slide.cta }}
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <path d="m9 18 6-6-6-6"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="hero__dots">
        <button *ngFor="let slide of slides; let i = index"
                class="hero__dot"
                [class.hero__dot--active]="activeSlide() === i"
                (click)="setSlide(i)"
                [attr.aria-label]="'Слайд ' + (i + 1)">
        </button>
    </div>
</section>

<!-- ============================================================
     СТАТИСТИКА
     ============================================================ -->
<section class="stats-bar">
    <div class="container stats-bar__inner">
        <div *ngFor="let stat of stats" class="stats-bar__item">
            <svg *ngIf="stat.icon === 'shield'" class="stats-bar__icon"
                 width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <svg *ngIf="stat.icon === 'layers'" class="stats-bar__icon"
                 width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                <polyline points="2 17 12 22 22 17"/>
                <polyline points="2 12 12 17 22 12"/>
            </svg>
            <svg *ngIf="stat.icon === 'users'" class="stats-bar__icon"
                 width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <div class="stats-bar__text">
                <span class="stats-bar__value">{{ stat.value }}</span>
                <span class="stats-bar__label">{{ stat.label }}</span>
            </div>
        </div>
    </div>
</section>

<!-- ============================================================
     НОВИНКИ
     ============================================================ -->
<section class="section">
    <div class="container">
        <div class="section__header">
            <h2 class="section__title">Новинки</h2>
            <a routerLink="/catalog" class="section__link">
                Весь список
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </a>
        </div>

        <!-- Скелетон -->
        <div class="products-grid" *ngIf="isLoadingNew()">
            <div *ngFor="let _ of skeletonArray.slice(0,4)" class="product-card product-card--skeleton">
                <div class="skeleton" style="aspect-ratio:1;"></div>
                <div class="product-card__body">
                    <div class="skeleton" style="height:14px;margin-bottom:8px;width:80%"></div>
                    <div class="skeleton" style="height:14px;width:50%"></div>
                </div>
            </div>
        </div>

        <!-- Картки через компонент -->
        <div class="products-grid" *ngIf="!isLoadingNew()">
            <app-product-card
                *ngFor="let product of newArrivals(); let i = index"
                [product]="product"
                [badge]="'NEW'"
                class="animate-fade-in delay-{{ i + 1 }}">
            </app-product-card>
        </div>
    </div>
</section>

<!-- ============================================================
     ХІТИ ПРОДАЖІВ
     ============================================================ -->
<section class="section section--alt">
    <div class="container">
        <div class="section__header">
            <h2 class="section__title">Хіти продажів</h2>
            <a routerLink="/catalog" class="section__link">
                Весь список
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </a>
        </div>

        <!-- Скелетон -->
        <div class="products-grid" *ngIf="isLoadingBest()">
            <div *ngFor="let _ of skeletonArray.slice(0,4)" class="product-card product-card--skeleton">
                <div class="skeleton" style="aspect-ratio:1;"></div>
                <div class="product-card__body">
                    <div class="skeleton" style="height:14px;margin-bottom:8px;width:80%"></div>
                    <div class="skeleton" style="height:14px;width:50%"></div>
                </div>
            </div>
        </div>

        <!-- Картки через компонент -->
        <div class="products-grid" *ngIf="!isLoadingBest()">
            <app-product-card
                *ngFor="let product of bestsellers(); let i = index"
                [product]="product"
                [badge]="'TOP'"
                class="animate-fade-in delay-{{ i + 1 }}">
            </app-product-card>
        </div>
    </div>
</section>

<!-- ============================================================
     ПІДПИСКА НА НОВИНИ
     ============================================================ -->
<section class="newsletter">
    <div class="container newsletter__inner">
        <div class="newsletter__text">
            <h2 class="newsletter__title">Підписка на новини</h2>
            <p class="newsletter__sub">Підпишись і будь в курсі наших акцій</p>
        </div>
        <div class="newsletter__form">
            <input type="text"  class="input" placeholder="Ваше ім'я" />
            <input type="email" class="input" placeholder="Ваш e-mail" />
            <button class="btn btn--primary">Підписатися</button>
        </div>
    </div>
</section>

<!-- ============================================================
     ПАРТНЕРИ
     ============================================================ -->
<section class="section">
    <div class="container">
        <h2 class="section__title" style="margin-bottom: var(--space-8);">Наші партнери</h2>
        <div class="partners-grid">
            <div *ngFor="let partner of partners" class="partner-card">
                <span class="partner-card__name">{{ partner }}</span>
            </div>
        </div>
    </div>
</section>
