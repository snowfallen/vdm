<div class="static-page">
  <div class="container">

    <nav class="breadcrumbs">
      <a routerLink="/" class="breadcrumbs__link">Головна</a>
      <span class="breadcrumbs__sep">›</span>
      <span class="breadcrumbs__current">Сертифікати</span>
    </nav>

    <h1 class="static-page__title">Сертифікати</h1>
    <p class="static-page__lead">
      Ми працюємо лише з оригінальною продукцією від офіційних виробників.
      Нижче — підтвердження нашого статусу дилера та сертифікати якості.
    </p>

    <!-- Сітка сертифікатів -->
    <div class="certs-grid">
      <button *ngFor="let cert of certificates; let i = index"
              class="cert-card"
              (click)="open(i)"
              [attr.aria-label]="'Відкрити: ' + cert.title">
        <div class="cert-card__img-wrap">
          <img [src]="cert.src" [alt]="cert.title" loading="lazy" />
          <span class="cert-card__zoom">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </span>
        </div>
        <span class="cert-card__title">{{ cert.title }}</span>
      </button>
    </div>

  </div>
</div>

<!-- ============ ЛАЙТБОКС ============ -->
<div class="lightbox" *ngIf="activeIndex() !== null" (click)="close()">
  <button class="lightbox__close" (click)="close()" aria-label="Закрити">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <button class="lightbox__nav lightbox__nav--prev" (click)="prev($event)" aria-label="Попереднє">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>

  <figure class="lightbox__content" (click)="$event.stopPropagation()">
    <img [src]="certificates[activeIndex()!].src"
         [alt]="certificates[activeIndex()!].title"
         class="lightbox__img" />
    <figcaption class="lightbox__caption">
      {{ certificates[activeIndex()!].title }}
      <span class="lightbox__counter">{{ activeIndex()! + 1 }} / {{ certificates.length }}</span>
    </figcaption>
  </figure>

  <button class="lightbox__nav lightbox__nav--next" (click)="next($event)" aria-label="Наступне">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>
</div>
