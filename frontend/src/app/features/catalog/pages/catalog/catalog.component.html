<div class="catalog-page">

  <!-- Хлібні крихти -->
  <nav class="breadcrumbs" *ngIf="breadcrumbs().length > 0">
    <div class="container breadcrumbs__inner">
      <ng-container *ngFor="let crumb of breadcrumbs(); let last = last">
        <a *ngIf="crumb.path && !last" [routerLink]="crumb.path" class="breadcrumbs__link">{{ crumb.label }}</a>
        <span *ngIf="!crumb.path || last" class="breadcrumbs__current">{{ crumb.label }}</span>
        <span *ngIf="!last" class="breadcrumbs__sep">›</span>
      </ng-container>
    </div>
  </nav>

  <!-- Скелетон -->
  <div class="container" *ngIf="isLoading()">
    <div class="catalog-skeleton">
      <div class="skeleton" style="height:32px;width:260px;border-radius:8px;"></div>
      <div class="catalog-layout">
        <div class="skeleton" style="height:400px;border-radius:12px;"></div>
        <div class="products-grid">
          <div *ngFor="let _ of [1,2,3,4,5,6]" class="skeleton product-skeleton"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="container" *ngIf="!isLoading()">

    <!-- Заголовок -->
    <div class="catalog-header">
      <div class="catalog-header__left">
        <h1 class="catalog-header__title">{{ pageTitle }}</h1>
        <span class="catalog-header__count" *ngIf="products().length > 0">
          {{ products().length }} товарів
        </span>
      </div>

      <div class="catalog-header__right" *ngIf="products().length > 0">
        <button class="filters-toggle-btn" (click)="toggleFilters()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/>
          </svg>
          Фільтри
          <span class="filters-toggle-btn__badge" *ngIf="activeFilterCount > 0">{{ activeFilterCount }}</span>
        </button>

        <div class="sort-select-wrap">
          <select class="sort-select" [value]="sortOption()"
                  (change)="onSortChange($any($event.target).value)">
            <option *ngFor="let opt of sortOptions" [value]="opt.value">{{ opt.label }}</option>
          </select>
        </div>

        <div class="view-toggle">
          <button class="view-toggle__btn" [class.view-toggle__btn--active]="viewMode()==='grid'"
                  (click)="toggleView('grid')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
          </button>
          <button class="view-toggle__btn" [class.view-toggle__btn--active]="viewMode()==='list'"
                  (click)="toggleView('list')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- ====== РЕЖИМ КАТЕГОРІЇ: підкатегорії у вигляді карток ====== -->
    <div *ngIf="hasSubCategories" class="subcategory-grid">
      <button *ngFor="let sub of subCategories()"
              class="subcategory-card"
              (click)="goToSubCategory(sub)">
        <div class="subcategory-card__icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <span class="subcategory-card__name">{{ sub.name }}</span>
        <svg class="subcategory-card__arrow" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <path d="m9 18 6-6-6-6"/>
        </svg>
      </button>
    </div>

    <!-- Плашки product groups (підкатегорія відкрита) -->
    <div *ngIf="hasGroups" class="groups-strip">
      <button *ngFor="let group of productGroups()"
              class="groups-strip__chip" (click)="goToGroup(group)">
        {{ group.name }}
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="m9 18 6-6-6-6"/>
        </svg>
      </button>
    </div>

    <!-- Активні фільтри — чіпи -->
    <div *ngIf="hasActiveFilters" class="active-filters">
      <span class="active-filters__label">Активні:</span>
      <ng-container *ngFor="let entry of activeFilters() | keyvalue">
        <button *ngFor="let val of entry.value"
                class="active-filters__chip"
                (click)="toggleFilter(+entry.key, val)">
          {{ val }} ✕
        </button>
      </ng-container>
      <button class="active-filters__clear" (click)="clearFilters()">Скинути все</button>
    </div>

    <!-- Layout: sidebar + товари (тільки якщо є товари) -->
    <div class="catalog-layout" *ngIf="allProducts().length > 0 || filtersLoading()">

      <!-- Sidebar фільтрів -->
      <aside class="filters-sidebar" [class.filters-sidebar--open]="filtersOpen()">
        <div class="filters-sidebar__header">
          <span class="filters-sidebar__title">Фільтри</span>
          <button *ngIf="hasActiveFilters" class="filters-sidebar__reset" (click)="clearFilters()">Скинути</button>
        </div>

        <div *ngIf="filtersLoading()" class="filters-loading">
          <div *ngFor="let _ of [1,2,3]" class="filters-loading__group">
            <div class="skeleton" style="height:14px;width:100px;border-radius:4px;margin-bottom:8px;"></div>
            <div *ngFor="let __ of [1,2,3]" class="skeleton" style="height:12px;width:80%;border-radius:4px;margin-bottom:6px;"></div>
          </div>
        </div>

        <p *ngIf="!filtersLoading() && availableFilters().length === 0" class="filters-empty">
          Немає доступних фільтрів
        </p>

        <div *ngFor="let filter of availableFilters()" class="filter-group">
          <div class="filter-group__name">
            {{ filter.attributeName }}
            <span *ngIf="filter.unitSymbol" class="filter-group__unit">({{ filter.unitSymbol }})</span>
          </div>

          <ng-container *ngIf="filter.dataType === 'DICT'">
            <label *ngFor="let val of filter.values"
                   class="filter-checkbox"
                   [class.filter-checkbox--active]="isFilterActive(filter.attributeId, val)">
              <input type="checkbox" [checked]="isFilterActive(filter.attributeId, val)"
                     (change)="toggleFilter(filter.attributeId, val)" />
              <span class="filter-checkbox__mark"></span>
              <span class="filter-checkbox__label">{{ val }}</span>
            </label>
          </ng-container>

          <ng-container *ngIf="filter.dataType === 'NUMBER'">
            <div class="filter-range">
              <input type="number" class="filter-range__input"
                     [placeholder]="'від ' + (filter.minValue ?? '')"
                     [value]="getRangeValue(filter.attributeId, 'min')"
                     (change)="updateRange(filter.attributeId, 'min', $any($event.target).value)" />
              <span class="filter-range__sep">—</span>
              <input type="number" class="filter-range__input"
                     [placeholder]="'до ' + (filter.maxValue ?? '')"
                     [value]="getRangeValue(filter.attributeId, 'max')"
                     (change)="updateRange(filter.attributeId, 'max', $any($event.target).value)" />
            </div>
          </ng-container>
        </div>
      </aside>

      <!-- Товари -->
      <div class="catalog-content">

        <!-- Лоадер фільтрації (поверх товарів) -->
        <div *ngIf="filterLoading()" class="filter-loading-overlay">
          <div class="filter-loading-spinner"></div>
        </div>

        <div *ngIf="products().length === 0 && !isLoading() && !filterLoading()"
             class="catalog-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
          <h3>Товари не знайдено</h3>
          <p *ngIf="hasActiveFilters">
            Спробуйте змінити фільтри або
            <button class="link-btn" (click)="clearFilters()">скинути всі</button>
          </p>
          <p *ngIf="!hasActiveFilters">У цій категорії поки що немає товарів</p>
        </div>

        <div *ngIf="products().length > 0"
             class="products-grid"
             [class.products-grid--list]="viewMode() === 'list'"
             [class.products-grid--loading]="filterLoading()">
          <app-product-card *ngFor="let product of products()" [product]="product" />
        </div>

      </div>
    </div>

    <!-- Помилка -->
    <div *ngIf="error()" class="catalog-error">{{ error() }}</div>

  </div>
</div>
