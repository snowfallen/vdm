<!-- TOP BAR -->
<div class="top-bar">
  <div class="container top-bar__inner">
    <nav class="top-bar__nav">
      <a *ngFor="let link of topLinks"
         [routerLink]="link.path"
         routerLinkActive="top-bar__link--active"
         class="top-bar__link">{{ link.label }}</a>
    </nav>

    <div class="top-bar__actions">
      <div class="lang-switch">
        <button class="lang-switch__btn lang-switch__btn--active">Укр</button>
        <span class="lang-switch__sep">|</span>
        <button class="lang-switch__btn">Рус</button>
      </div>

      <div class="social-icons">
        <a href="https://facebook.com" target="_blank" aria-label="Facebook" class="social-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
          </svg>
        </a>
        <a href="https://instagram.com" target="_blank" aria-label="Instagram" class="social-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </a>
      </div>

      <!-- ЗАЛОГІНЕНИЙ -->
      <div class="auth-links" *ngIf="isLoggedIn">
        <a routerLink="/admin" class="auth-links__link auth-links__link--cabinet">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          {{ isAdmin ? 'Панель адміна' : 'Кабінет' }}
        </a>
        <span class="auth-links__sep">|</span>
        <button class="auth-links__link auth-links__btn" (click)="logout()">Вийти</button>
      </div>

      <!-- ГІСТЬ -->
      <div class="auth-links" *ngIf="!isLoggedIn">
        <a routerLink="/login" class="auth-links__link">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          Вхід
        </a>
        <span class="auth-links__sep">|</span>
        <a routerLink="/register" class="auth-links__link">Реєстрація</a>
      </div>
    </div>
  </div>
</div>

<!-- MAIN HEADER -->
<header class="header" [class.header--scrolled]="isScrolled()">
  <div class="container header__inner">

    <a routerLink="/" class="logo" aria-label="VDM — на головну">
      <div class="logo__mark">
        <span class="logo__vdm">ВДМ</span>
        <span class="logo__sub">VDM</span>
      </div>
      <div class="logo__tagline">Все для меблів</div>
    </a>

    <div class="search-bar">
      <div class="search-bar__wrap">
        <svg class="search-bar__icon" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" class="search-bar__input" placeholder="Пошук товару..."
               [(ngModel)]="searchQuery" (keyup.enter)="onSearch()" />
        <button class="search-bar__btn btn btn--primary btn--sm" (click)="onSearch()">
          Знайти
        </button>
      </div>
    </div>

    <!-- Десктоп: контакти + кошик + кабінет -->
    <div class="header__right">
      <div class="contacts-block">
        <svg class="contacts-block__icon" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.77 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.68 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.63a16 16 0 0 0 6 6l1.07-1.07a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        <div class="contacts-block__info">
          <a *ngFor="let phone of phones" [href]="phone.href" class="contacts-block__phone">
            {{ phone.label }}
          </a>
          <span class="contacts-block__hours">{{ workHours }}</span>
        </div>
      </div>

      <!-- Кошик — тільки для CLIENT -->
      <a *ngIf="isClient" routerLink="/cart" class="icon-btn" aria-label="Кошик">
        <div class="icon-btn__icon-wrap">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          <span class="icon-btn__badge" *ngIf="cartCount() > 0">{{ cartCount() }}</span>
        </div>
        <span class="icon-btn__label">Кошик</span>
      </a>

      <!-- Кабінет залогінений -->
      <a *ngIf="isLoggedIn" routerLink="/admin" class="icon-btn" aria-label="Кабінет">
        <div class="icon-btn__icon-wrap">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <span class="icon-btn__label">{{ isAdmin ? 'Адмін' : 'Кабінет' }}</span>
      </a>
    </div>

    <!-- Мобільні іконки -->
    <div class="header__mobile-actions">
      <a *ngIf="isClient" routerLink="/cart" class="icon-btn icon-btn--sm">
        <div class="icon-btn__icon-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          <span class="icon-btn__badge" *ngIf="cartCount() > 0">{{ cartCount() }}</span>
        </div>
      </a>
      <a *ngIf="isLoggedIn" routerLink="/admin" class="icon-btn icon-btn--sm">
        <div class="icon-btn__icon-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </a>
    </div>

  </div>
</header>
