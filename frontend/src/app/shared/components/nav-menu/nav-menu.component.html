<nav class="nav-menu" aria-label="Каталог товарів" (mouseleave)="onMenuLeave()">
  <div class="container">

    <!-- Desktop навбар -->
    <ul class="nav-menu__list" role="menubar">

      <!-- Скелетон при завантаженні -->
      <ng-container *ngIf="isLoading()">
        <li *ngFor="let _ of [1,2,3,4,5]" class="nav-menu__item">
          <div class="nav-menu__skeleton"></div>
        </li>
      </ng-container>

      <!-- Категорії -->
      <li *ngFor="let cat of categories()"
          class="nav-menu__item"
          role="none"
          (mouseenter)="onCategoryEnter(cat)">

        <a [routerLink]="['/catalog', cat.id]"
           class="nav-menu__link"
           [class.nav-menu__link--active]="activeCategory()?.id === cat.id"
           role="menuitem"
           [attr.aria-haspopup]="cat.subCategories.length > 0"
           [attr.aria-expanded]="activeCategory()?.id === cat.id">
          {{ cat.name }}
          <svg *ngIf="cat.subCategories.length > 0"
               class="nav-menu__arrow"
               width="10" height="10" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </a>
      </li>
    </ul>

    <!-- ============================================================
         МЕГА-МЕНЮ ДРОПДАУН
         ============================================================ -->
    <div class="mega-menu"
         *ngIf="activeCategory() && activeCategory()!.subCategories.length > 0"
         role="menu"
         (mouseenter)="onCategoryEnter(activeCategory()!)"
         [@slideDown]>

      <div class="container mega-menu__inner">

        <!-- Заголовок категорії -->
        <div class="mega-menu__header">
          <a [routerLink]="['/catalog', activeCategory()!.id]"
             class="mega-menu__cat-title">
            {{ activeCategory()!.name }}
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <path d="m9 18 6-6-6-6"/>
            </svg>
          </a>
          <span class="mega-menu__count">
            {{ activeCategory()!.subCategories.length }} підкатегорій
          </span>
        </div>

        <!-- Сітка: підкатегорії + product groups -->
        <div class="mega-menu__grid">
          <div *ngFor="let sub of activeCategory()!.subCategories"
               class="mega-menu__col">

            <!-- Підкатегорія -->
            <a [routerLink]="['/catalog', activeCategory()!.id, sub.id]"
               class="mega-menu__sub-title">
              {{ sub.name }}
            </a>

            <!-- Product groups (якщо є) -->
            <ul *ngIf="sub.productGroups.length > 0"
                class="mega-menu__groups">
              <li *ngFor="let group of sub.productGroups">
                <a [routerLink]="['/catalog', activeCategory()!.id, sub.id, group.id]"
                   class="mega-menu__group-link">
                  {{ group.name }}
                </a>
              </li>
            </ul>

            <!-- Якщо немає груп — посилання на всі товари підкатегорії -->
            <a *ngIf="sub.productGroups.length === 0"
               [routerLink]="['/catalog', activeCategory()!.id, sub.id]"
               class="mega-menu__all-link">
              Всі товари →
            </a>
          </div>
        </div>

      </div>
    </div>
    <!-- / МЕГА-МЕНЮ -->

  </div>
</nav>
