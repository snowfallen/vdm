<div class="dt">

  <!-- Скелетон -->
  <div class="dt__skeleton" *ngIf="isLoading">
    <div class="skeleton" *ngFor="let _ of [1,2,3,4,5]"
         style="height: 44px; border-radius: 6px;"></div>
  </div>

  <ng-container *ngIf="!isLoading">

    <!-- Таблиця -->
    <div class="dt__wrap">
      <table class="dt__table">
        <thead class="dt__head">
          <tr>
            <th *ngFor="let col of columns"
                class="dt__th"
                [style.width]="col.width">
              {{ col.label }}
            </th>
            <th *ngIf="showActions" class="dt__th dt__th--actions">Дії</th>
          </tr>
        </thead>
        <tbody class="dt__body">
          <tr *ngIf="data.length === 0">
            <td [attr.colspan]="columns.length + (showActions ? 1 : 0)"
                class="dt__empty">
              {{ emptyMessage }}
            </td>
          </tr>
          <tr *ngFor="let row of data" class="dt__row">
            <td *ngFor="let col of columns" class="dt__td">
              {{ getValue(row, col.key) ?? '—' }}
            </td>
            <td *ngIf="showActions" class="dt__td dt__td--actions">
              <div class="dt__actions">
                <button class="dt__btn dt__btn--view"
                        title="Переглянути"
                        (click)="onView(row)">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
                <button class="dt__btn dt__btn--edit"
                        title="Редагувати"
                        (click)="onEdit(row)">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                  </svg>
                </button>
                <button class="dt__btn dt__btn--delete"
                        title="Видалити"
                        (click)="onDelete(row)">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                    <path d="M10 11v6M14 11v6"/>
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Пагінація -->
    <div class="dt__pagination" *ngIf="totalPages > 1">
      <button class="dt__page-btn"
              [disabled]="currentPage === 0"
              (click)="goToPage(currentPage - 1)">‹</button>

      <button *ngFor="let p of pages"
              class="dt__page-btn"
              [class.dt__page-btn--active]="p === currentPage"
              (click)="goToPage(p)">
        {{ p + 1 }}
      </button>

      <button class="dt__page-btn"
              [disabled]="currentPage === totalPages - 1"
              (click)="goToPage(currentPage + 1)">›</button>

      <span class="dt__page-info">
        {{ currentPage + 1 }} / {{ totalPages }}
        ({{ totalElements }} записів)
      </span>
    </div>

  </ng-container>
</div>
