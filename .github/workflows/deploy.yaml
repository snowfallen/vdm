# ============================================================
# GitHub Actions — CI/CD pipeline.
#
# Тригер: push в main — тільки якщо змінились відповідні файли.
# Бек і фронт білдяться незалежно (окремі jobs з paths фільтром).
#
# Секрети в GitHub Settings → Secrets:
# - VPS_HOST            — IP адреса VPS
# - VPS_SSH_KEY         — Приватний SSH ключ
# - VPS_USER            — SSH юзер (root або deploy)
# ============================================================

name: Deploy to Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vdm-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vdm-frontend

jobs:
  # -------------------------------------------------------
  # Job 1: Build і push Backend (тільки якщо змінився бек)
  # -------------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Запускається тільки якщо змінились файли бека або workflow
    if: |
      contains(github.event.commits[0].modified, 'backend/') ||
      contains(github.event.commits[0].added, 'backend/')    ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          # Кеш шарів між білдами — суттєво швидше повторні білди
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------
  # Job 2: Build і push Frontend (тільки якщо змінився фронт)
  # -------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: |
      contains(github.event.commits[0].modified, 'frontend/') ||
      contains(github.event.commits[0].added, 'frontend/')    ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------
  # Job 3: Deploy на VPS (запускається після білдів)
  # always() — деплоїть навіть якщо один з білдів був пропущений
  # -------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always() && !failure() && !cancelled()

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Оновлюємо тільки ті deployments для яких був білд
            # needs.build-backend.result == 'success' — білд пройшов (не skipped)
            if [ "${{ needs.build-backend.result }}" = "success" ]; then
              kubectl -n vdm set image deployment/backend \
                backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
              kubectl -n vdm rollout status deployment/backend --timeout=120s
            fi

            if [ "${{ needs.build-frontend.result }}" = "success" ]; then
              kubectl -n vdm set image deployment/frontend \
                frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
              kubectl -n vdm rollout status deployment/frontend --timeout=120s
            fi

            echo "✅ Deploy completed: ${{ github.sha }}"
