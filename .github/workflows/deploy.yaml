name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vdm-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vdm-frontend

jobs:
  # -------------------------------------------------------
  # Job 1: Build і push Docker images (завжди)
  # -------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------
  # Job 2: Deploy на VPS через SSH + kubectl
  # -------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            kubectl -n vdm set image deployment/backend \
              backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            kubectl -n vdm set image deployment/frontend \
              frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

            kubectl -n vdm rollout status deployment/backend --timeout=180s
            kubectl -n vdm rollout status deployment/frontend --timeout=120s

            echo "✅ Deploy completed: ${{ github.sha }}"