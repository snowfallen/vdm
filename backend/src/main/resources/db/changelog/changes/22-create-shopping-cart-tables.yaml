databaseChangeLog:
  - changeSet:
      id: create-shopping-cart-tables
      author: snowfall
      changes:
        # shopping_carts
        - createTable:
            tableName: shopping_carts
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_cart_user
                    references: users(id)

        # cart_items
        - createTable:
            tableName: cart_items
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: shopping_cart_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_item_cart
                    references: shopping_carts(id)
                    deleteCascade: true
              - column:
                  name: product_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_item_product
                    references: products(id)
              - column:
                  name: quantity
                  type: int
                  constraints: { nullable: false }
