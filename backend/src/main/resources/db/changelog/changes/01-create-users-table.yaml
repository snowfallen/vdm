databaseChangeLog:
  - changeSet:
      id: create-users-table
      author: snowfall
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement:  true
                  constraints:
                    primaryKey:  true
                    nullable:  false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email_verified
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                      nullable: false
              - column:
                  name: phone_number
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: modified_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: create-verification-tokens
      author: snowfall
      changes:
        - createTable:
            tableName: verification_tokens
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true,
                          constraints: { primaryKey: true } }
              - column: { name: token, type: VARCHAR(255),
                          constraints: { unique: true, nullable: false } }
              - column: { name: user_id, type: BIGINT,
                          constraints: { nullable: false, foreignKeyName: fk_token_user,
                                         references: users(id), deleteCascade: true } }
              - column: { name: expires_at, type: TIMESTAMP,
                          constraints: { nullable: false } }
