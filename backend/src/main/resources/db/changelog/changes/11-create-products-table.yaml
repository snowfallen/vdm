databaseChangeLog:
  - changeSet:
      id: create-products-table
      author: snowfall
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: decimal(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: product_group_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_product_group
                    references: product_groups(id)
                    deleteCascade: true
