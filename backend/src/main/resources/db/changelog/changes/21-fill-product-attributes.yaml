databaseChangeLog:
  - changeSet:
      id: fill-product-attributes
      author: snowfall
      changes:
        # ===== Product 1: Напрямна верхня алюмінієва 1800мм =====
        - insert:
            tableName: product_attributes
            columns:
              - column:
                  name: product_id
                  valueComputed: "(SELECT id FROM products WHERE name='Напрямна верхня алюмінієва 1800мм' LIMIT 1)"
              - column:
                  name: attribute_id
                  valueComputed: "(SELECT id FROM attributes WHERE name='Матеріал' LIMIT 1)"
              - column:
                  name: option_id
                  valueComputed: "(SELECT id FROM attribute_options WHERE attribute_id=(SELECT id FROM attributes WHERE name='Матеріал' LIMIT 1) AND value='Алюміній' LIMIT 1)"
        - insert:
            tableName: product_attributes
            columns:
              - column:
                  name: product_id
                  valueComputed: "(SELECT id FROM products WHERE name='Напрямна верхня алюмінієва 1800мм' LIMIT 1)"
              - column:
                  name: attribute_id
                  valueComputed: "(SELECT id FROM attributes WHERE name='Довжина, мм' LIMIT 1)"
              - column: { name: custom_value, value: "1800" }
        - insert:
            tableName: product_attributes
            columns:
              - column:
                  name: product_id
                  valueComputed: "(SELECT id FROM products WHERE name='Напрямна верхня алюмінієва 1800мм' LIMIT 1)"
              - column:
                  name: attribute_id
                  valueComputed: "(SELECT id FROM attributes WHERE name='Тип відкривання' LIMIT 1)"
              - column:
                  name: option_id
                  valueComputed: "(SELECT id FROM attribute_options WHERE attribute_id=(SELECT id FROM attributes WHERE name='Тип відкривання' LIMIT 1) AND value='Розсувне' LIMIT 1)"

