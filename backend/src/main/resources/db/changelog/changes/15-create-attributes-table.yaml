databaseChangeLog:
  - changeSet:
      id: create-attributes-table
      author: snowfall
      changes:
        - createTable:
            tableName: attributes
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: name
                  type: varchar(255)
                  constraints: { nullable: false, unique: true }
              - column:
                  name: data_type
                  type: varchar(20)
                  constraints: { nullable: false }
              - column:
                  name: unit_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_attribute_unit
                    references: units(id)
