databaseChangeLog:
  - changeSet:
      id: create-attribute-options-table
      author: snowfall
      changes:
        - createTable:
            tableName: attribute_options
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: attribute_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_option_attribute
                    references: attributes(id)
                    deleteCascade: true
              - column:
                  name: value
                  type: varchar(255)
                  constraints: { nullable: false }
