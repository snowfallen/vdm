databaseChangeLog:
  - changeSet:
      id: create-product-attributes-table
      author: snowfall
      changes:
        - createTable:
            tableName: product_attributes
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: product_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_attribute_product
                    references: products(id)
                    deleteCascade: true
              - column:
                  name: attribute_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_attribute_attribute
                    references: attributes(id)
              - column:
                  name: option_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_product_attribute_option
                    references: attribute_options(id)
              - column:
                  name: custom_value
                  type: varchar(500)
